name: Scrape Realtor.ca

# Runs from GitHub Actions (Azure IP space) to bypass the IP block that
# affects Vercel's Lambda egress addresses when calling api2.realtor.ca.
#
# Required GitHub repo secrets:
#   NEXT_PUBLIC_SUPABASE_URL    — Settings → Secrets → Actions
#   SUPABASE_SERVICE_ROLE_KEY   — Settings → Secrets → Actions

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC (same slot as former Vercel cron)
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  scrape:
    name: Realtor.ca → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Realtor.ca scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/scrape-realtor-ca.ts
